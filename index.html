<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoUDABOL Oruro - Sistema de Gestión de Residuos Urbano</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div id="loginScreen" class="login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-recycle"></i> EcoUDABOL Oruro</h2>
            <p>Monitoreo de Basura Urbano en Tiempo Real</p>
            <hr>
            <div id="error" class="error-msg"></div>
            
            <div class="input-group">
                <label for="user"><i class="fas fa-user"></i> Usuario:</label>
                <input type="text" id="user" placeholder="Ej: Rodrigo Melendres o camion">
            </div>
            <div class="input-group">
                <label for="pass"><i class="fas fa-lock"></i> Contraseña:</label>
                <input type="password" id="pass" placeholder="Clave de acceso">
            </div>
            
            <button class="btn btn-primary" onclick="loginPersonal()">Iniciar como Personal EMAO</button>
            <div class="separator"><span>Ó</span></div>
            <button class="btn btn-secondary" onclick="loginVecino()">Ingresar como Vecino de Oruro</button>
        </div>
    </div>

    <button id="toggleMenuBtn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span id="userType"><i class="fas fa-user"></i> Cargando...</span>
        </div>

        <div class="sidebar-section">
            <button class="btn btn-add" onclick="activarModoAgregar()"><i class="fas fa-plus-circle"></i> Reportar Punto</button>
            <button id="exportBtn" class="btn btn-export" onclick="exportarDatos()"><i class="fas fa-file-csv"></i> Exportar CSV</button>
            <button id="clearBtn" class="btn btn-danger" onclick="limpiarPuntos()"><i class="fas fa-trash-alt"></i> Limpiar Todo</button>
        </div>

        <div class="sidebar-section">
            <label for="mapFilter"><b><i class="fas fa-filter"></i> Filtrar Mapa:</b></label>
            <select id="mapFilter">
                <option value="todos">Mostrar Todo Oruro</option>
                <option value="alto">Solo Puntos Críticos (Alto)</option>
                <option value="espera">Solo en Espera de Camión</option>
            </select>
        </div>

        <div class="sidebar-section">
            <h3>ESTADÍSTICAS GENERALES</h3>
            <div class="stat-row">
                <span>Bajo: <b id="txtLow">0</b></span>
                <div class="progress-bar"><div id="barLow" class="progress bg-low"></div></div>
            </div>
            <div class="stat-row">
                <span>Medio: <b id="txtMed">0</b></span>
                <div class="progress-bar"><div id="barMed" class="progress bg-med"></div></div>
            </div>
            <div class="stat-row">
                <span>Alto: <b id="txtHigh">0</b></span>
                <div class="progress-bar"><div id="barHigh" class="progress bg-high"></div></div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>ESTADO DE RECOLECCIÓN</h3>
            <div class="status-item">🕒 En espera: <b id="txtEspera">0</b></div>
            <div class="status-item">🚛 En camino: <b id="txtCamino">0</b></div>
            <div class="status-item">✅ Recogido: <b id="txtRecogido">0</b></div>
        </div>

        <div class="sidebar-section chat-section">
            <h3><i class="fas fa-comments"></i> Mensajes de Alerta</h3>
            <div class="chat-input-box">
                <input type="text" id="mensaje" placeholder="Escribe un aviso...">
                <button onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div id="messages" class="messages-container"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
